specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Luciq (formerly Instabug)
providerId: instabug
created: '2026-05-23'
modified: '2026-05-23'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Mobile Observability
description: FOCUS-aligned FinOps for Luciq (Instabug). Pricing dimension is Daily Active Users (DAU) and member Seats, not logs/sessions/traces; per-DAU entitlement is 180 sessions/month.
sources:
  - https://luciq.ai/pricing
  - https://docs.luciq.ai/organization-settings/billing/license-entitlements-and-restrictions/july-2025-license-entitlements-and-restrictions
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Luciq
serviceCategory: Mobile Observability
billingModel:
  pricingCategory: DAU + Seats (Annual Commitment / Custom Enterprise)
  billingFrequency: Annual
  billingCurrency: USD
focusColumns:
  ServiceName: Luciq
  ServiceCategory: Mobile Observability
  ProviderName: Luciq
  PublisherName: Luciq
  BillingCurrency: USD
meters:
  - name: daily_active_users
    unit: dau
    aggregation: max
    dimensions:
      - application
      - platform
      - product
  - name: member_seats
    unit: seat-month
    aggregation: max
  - name: observer_seats
    unit: seat-month
    aggregation: max
  - name: sessions
    unit: session
    aggregation: sum
    dimensions:
      - application
      - product
principles:
  - name: Visibility
    description: Track Luciq DAU + seat consumption monthly via the dashboard DAU Usage Page.
  - name: Allocation
    description: Tag apps to teams/cost centers; use Team Dashboard for per-team consumption views.
  - name: Optimization
    description: Right-size DAU bundles annually; reclaim unused member and observer seats; review session-per-DAU envelope against actual usage.
  - name: Accountability
    description: Set alerts on session and DAU growth; quarterly review with Customer Success.
